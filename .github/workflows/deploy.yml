name: Deploy

on:
  push:
    branches: [main]

# Only one deploy can run at a time; a new push cancels any in-progress deploy
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Build & push Docker images to Docker Hub ─────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./dgh-tech-solutions-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dgh-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dgh-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./dgh-tech-solutions-client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dgh-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dgh-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Pull & restart on DigitalOcean Droplet via SSH ───────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/dghtechsolutions

            # Pull latest images
            docker compose pull

            # Restart with zero-downtime (compose recreates only changed containers)
            docker compose up -d --remove-orphans

            # Remove dangling images to keep disk clean
            docker image prune -f
