name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + dependency audit ────────────────────────────────────────
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dgh-tech-solutions-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dgh-tech-solutions-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true   # report but don't fail the build

      - name: Verify server.js loads without errors
        run: node --check server.js

  # ── Frontend: install + production build ────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dgh-tech-solutions-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dgh-tech-solutions-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dgh-tech-solutions-client/dist/dgh-tech-solutions-client/browser
          retention-days: 7
