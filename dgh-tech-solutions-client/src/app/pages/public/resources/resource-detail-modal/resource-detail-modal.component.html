<!-- Overlay — click outside to close -->
<div
  class="modal-overlay"
  role="presentation"
  (click)="onOverlayClick($event)"
>
  <!-- Dialog panel -->
  <div
    class="modal-panel"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'rdm-title-' + resource._id"
  >

    <!-- ── Sticky header ───────────────────────────────────────────────────── -->
    <div class="modal-header">
      <div class="modal-header__meta">
        <span class="modal-type-pill {{ typeColorClass }}">{{ typeLabel }}</span>
        <span class="modal-access-badge {{ accessClass }}">{{ accessLabel }}</span>
        @if (resource.isFeatured) {
          <span class="modal-featured-badge">Featured</span>
        }
      </div>
      <h2 class="modal-header__title" [id]="'rdm-title-' + resource._id">{{ resource.title }}</h2>
      <button
        class="modal-close"
        type="button"
        aria-label="Close details"
        (click)="close()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- ── Scrollable body ────────────────────────────────────────────────── -->
    <div class="modal-body">
      <!-- Panel with identity hidden — the header above provides title/badges -->
      <app-resource-detail-panel
        [resource]="resource"
        [purchased]="purchased"
        [showIdentity]="false"
      />
    </div>

    <!-- ── Sticky footer ─────────────────────────────────────────────────── -->
    <div class="modal-footer">
      @if (showPrice) {
        <div class="modal-footer__pricing">
          @if (oldPrice) {
            <span class="modal-footer__old-price">{{ oldPrice }}</span>
          }
          <span class="modal-footer__price">{{ salePrice }}</span>
          @if (discountPct) {
            <span class="modal-footer__discount">{{ discountPct }}% OFF</span>
          }
        </div>
      }
      <div class="modal-footer__buttons">
        @if (secondaryLabel) {
          <button
            class="btn btn--outline modal-footer__secondary"
            type="button"
            [attr.aria-label]="secondaryLabel + ': ' + resource.title"
            (click)="open.emit(resource); close()"
          >{{ secondaryLabel }}</button>
        }
        <button
          class="btn btn--primary modal-footer__cta"
          type="button"
          [attr.aria-label]="primaryLabel + ': ' + resource.title"
          (click)="open.emit(resource); close()"
        >{{ primaryLabel }}</button>
      </div>
    </div>

  </div>
</div>
