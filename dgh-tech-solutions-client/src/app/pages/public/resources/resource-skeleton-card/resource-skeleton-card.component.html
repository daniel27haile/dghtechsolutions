<div class="skel-card" aria-hidden="true">
  <!-- Thumbnail placeholder (16:9) -->
  <div class="skel skel--thumb"></div>
  <!-- Body -->
  <div class="skel-card__body">
    <!-- Badge row -->
    <div class="skel-card__badges">
      <div class="skel skel--badge"></div>
      <div class="skel skel--badge skel--badge-sm"></div>
    </div>
    <!-- Title lines -->
    <div class="skel skel--line skel--title"></div>
    <div class="skel skel--line skel--title-short"></div>
    <!-- Description lines -->
    <div class="skel skel--line skel--desc"></div>
    <div class="skel skel--line skel--desc-short"></div>
    <!-- Stats -->
    <div class="skel skel--line skel--stats"></div>
  </div>
  <!-- Footer -->
  <div class="skel-card__footer">
    <div class="skel skel--btn"></div>
    <div class="skel skel--btn"></div>
  </div>
</div>
